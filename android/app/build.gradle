plugins {
    id "com.android.application"
}

android {
    namespace "dev.rayclip.android"
    compileSdk 35

    defaultConfig {
        applicationId "dev.rayclip.android"
        minSdk 26
        targetSdk 35
        versionCode 1
        versionName "0.1.0"

        def configuredApiUrl = providers.gradleProperty("rayclip.apiUrl").orElse("").get()
        def configuredToken = providers.gradleProperty("rayclip.token").orElse("").get()

        buildConfigField "String", "DEFAULT_API_URL", "\"${configuredApiUrl}\""
        buildConfigField "String", "DEFAULT_TOKEN", "\"${configuredToken}\""
    }

    buildFeatures {
        buildConfig true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
